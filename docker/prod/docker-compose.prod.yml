services:
  java-service:
    build:
      context: /opt/apps/java-service
      dockerfile: Dockerfile

    image: java-service:prod
    container_name: java-service

    restart: unless-stopped

    ports:
      - "0.0.0.0:8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
      TZ: Europe/Madrid

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s